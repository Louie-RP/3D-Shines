name = "3dshines"
main = "src/worker.js"
compatibility_date = "2026-05-19"
# Optional but recommended once connected to your Cloudflare account.
# account_id = "<your-cloudflare-account-id>"

[vars]
# Use your GitHub Pages origin (origin only, no path), for example:
# https://louie-rp.github.io
FRONTEND_ORIGIN = "https://louie-rp.github.io"
# Use your full storefront base URL for redirect paths (includes repo path).
FRONTEND_BASE_URL = "https://louie-rp.github.io/3D-Shines"
# Comma-separated list for local development origins.
CORS_ALLOWED_ORIGINS = "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500"

[[d1_databases]]
binding = "DB"
database_name = "3dshines-orders"
database_id = "b436c825-c689-48ae-9ab5-ab3388666906"